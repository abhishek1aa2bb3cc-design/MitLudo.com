<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple JS Ludo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ludo-board">
            <!-- Board is generated via JS for efficiency -->
        </div>
        <div class="controls">
            <h2 id="status">Player 1's Turn</h2>
            <button id="dice-btn" onclick="rollDice()">Roll Dice</button>
            <div id="dice-result">-</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
