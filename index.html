<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Ludo</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            padding: 20px;
            max-width: 900px;
            width: 95%;
            max-height: 90vh;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .header h1 {
            color: #4a5568;
            margin-bottom: 10px;
        }

        .players-info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .player-info {
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            min-width: 120px;
            transition: all 0.3s;
        }

        .player-info.active {
            background: rgba(255,255,255,0.8);
            transform: scale(1.05);
        }

        .player-color-0 { border: 3px solid #ff4444; color: #ff4444; }
        .player-color-1 { border: 3px solid #44ff44; color: #44ff44; }
        .player-color-2 { border: 3px solid #4444ff; color: #4444ff; }
        .player-color-3 { border: 3px solid #ffff44; color: #ffff44; }

        .ludo-board {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            background: #f8f9fa;
            border: 8px solid #333;
            border-radius: 10px;
            margin: 0 auto 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
        }

        .board-cell {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
        }

        .home-area {
            width: 30%;
            height: 30%;
            border: 4px solid;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .home-0 { top: 5%; left: 5%; background: #ffeeee; border-color: #ff4444; }
        .home-1 { top: 5%; right: 5%; background: #eeffee; border-color: #44ff44; }
        .home-2 { bottom: 5%; right: 5%; background: #eeeeff; border-color: #4444ff; }
        .home-3 { bottom: 5%; left: 5%; background: #ffffee; border-color: #ffff44; }

        .safe-spot {
            background: white;
            border-radius: 50%;
            width: 80%;
            height: 80%;
        }

        .path {
            background: #e2e8f0;
        }

        .controls {
            text-align: center;
            margin-top: 20px;
        }

        .dice-container {
            display: inline-flex;
            align-items: center;
            gap: 20px;
            background: #f7fafc;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .dice {
            width: 80px;
            height: 80px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .dice:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.3);
        }

        .dice.rolling {
            animation: roll 0.8s ease-in-out;
        }

        @keyframes roll {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(90deg); }
            50% { transform: rotate(180deg); }
            75% { transform: rotate(270deg); }
        }

        .roll-btn {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            background: linear-gradient(45deg, #48bb78, #38a169);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(72,187,120,0.4);
        }

        .roll-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(72,187,120,0.6);
        }

        .roll-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .piece {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 3px solid white;
            cursor: pointer;
            transition: all 0.3s;
            position: absolute;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .piece:hover {
            transform: scale(1.2);
        }

        .piece-0 { background: #ff4444; }
        .piece-1 { background: #44ff44; }
        .piece-2 { background: #4444ff; }
        .piece-3 { background: #ffff44; }

        .status {
            text-align: center;
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            min-height: 25px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .join-input {
            padding: 15px;
            font-size: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            margin: 20px 0;
            width: 80%;
            max-width: 300px;
        }

        .btn {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #4299e1;
            color: white;
        }

        .btn-primary:hover {
            background: #3182ce;
        }

        @media (max-width: 768px) {
            .game-container {
                padding: 10px;
                width: 98%;
            }
            
            .dice {
                width: 60px;
                height: 60px;
                font-size: 24px;
            }
            
            .players-info {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🎲 Multiplayer Ludo</h1>
            <div class="players-info" id="playersInfo">
                <!-- Players will be populated here -->
            </div>
        </div>
        
        <div class="ludo-board" id="board">
            <!-- Board cells will be generated dynamically -->
        </div>
        
        <div class="controls">
            <div class="dice-container">
                <div class="dice" id="dice">🎲</div>
                <button class="roll-btn" id="rollBtn">Roll Dice</button>
            </div>
            <div class="status" id="status">Waiting for players...</div>
        </div>
    </div>

    <!-- Join Game Modal -->
    <div class="modal" id="joinModal">
        <div class="modal-content">
            <h2>Join Game</h2>
            <p>Enter your name to join:</p>
            <input type="text" class="join-input" id="playerName" placeholder="Your name" maxlength="12">
            <br>
            <button class="btn btn-primary" id="joinBtn">Join Game</button>
            <button class="btn" id="createGameBtn" style="background: #48bb78; color: white;">Create New Game</button>
        </div>
    </div>

    <script>
        class LudoGame {
            constructor() {
                this.socket = io('https://ludo-server-8b8b.onrender.com'); // Replace with your server URL
                this.playerId = null;
                this.playerColor = null;
                this.gameId = null;
                this.currentPlayer = null;
                this.diceValue = 0;
                this.pieces = {};
                this.boardCells = [];
                this.selectedPiece = null;
                
                this.initBoard();
                this.bindEvents();
                this.showJoinModal();
            }

            initBoard() {
                const board = document.getElementById('board');
                const cellSize = Math.min(board.offsetWidth, board.offsetHeight) / 15;
                
                // Create 52 path cells + 4 home cells + safe spots
                this.createBoardCells(board, cellSize);
            }

            createBoardCells(board, cellSize) {
                const colors = ['#ff4444', '#44ff44', '#4444ff', '#ffff44'];
                
                // Home areas
                for (let i = 0; i < 4; i++) {
                    const home = document.createElement('div');
                    home.className = `home-area home-${i}`;
                    home.style.left = i % 2 === 0 ? '5%' : '65%';
                    home.style.top = i < 2 ? '5%' : '65%';
                    home.innerHTML = `
                        <div class="safe-spot"></div>
                        <div style="color: ${colors[i]}; font-weight: bold; margin-top: 5px;">HOME</div>
                    `;
                    board.appendChild(home);
                }

                // Main path (52 cells)
                const pathPositions = this.generatePathPositions();
                for (let i = 0; i < 52; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'board-cell path';
                    cell.style.width = `${cellSize}px`;
                    cell.style.height = `${cellSize}px`;
                    cell.style.left = `${pathPositions[i].x * 100}%`;
                    cell.style.top = `${pathPositions[i].y * 100}%`;
                    cell.dataset.cell = i;
                    board.appendChild(cell);
                    this.boardCells[i] = cell;
                }
            }

            generatePathPositions() {
                const positions = [];
                // Red path (0-12)
                for (let i = 0; i < 6; i++) positions.push({x: 0.67 + i*0.066, y: 0.67});
                for (let i = 0; i < 7; i++) positions.push({x: 1, y: 0.67 - i*0.066});
                
                // Green path (13-25)
                for (let i = 0; i < 6; i++) positions.push({x: 0.33 - i*0.066, y: 0});
                for (let i = 0; i < 7; i++) positions.push({x: 0, y: i*0.066});
                
                // Blue path (26-38)
                for (let i = 0; i < 6; i++) positions.push({x: 0.33, y: i*0.066});
                for (let i = 0; i < 7; i++) positions.push({x: 0.33 + i*0.066, y: 1});
                
                // Yellow path (39-51)
                for (let i = 0; i < 6; i++) positions.push({x: 0.67, y: 1 - i*0.066});
                for (let i = 0; i < 6; i++) positions.push({x: 1 - i*0.066, y: 0.33});
                
                return positions;
            }

            bindEvents() {
                document.getElementById('rollBtn').addEventListener('click', () => this.rollDice());
                document.getElementById('dice').addEventListener('click', () => this.rollDice());
                document.getElementById('joinBtn').addEventListener('click', () => this.joinGame());
                document.getElementById('createGameBtn').addEventListener('click', () => this.createGame());
                
                document.addEventListener('click', (e) => {
                    if (e.target.classList.contains('piece') && this.canMovePiece(e.target)) {
                        this.movePiece(e.target);
                    }
                });

                this.socket.on('gameState', (state) => this.updateGameState(state));
                this.socket.on('playerJoined', (players) => this.updatePlayers(players));
                this.socket.on('turn', (playerId) => this.setCurrentPlayer(playerId));
                this.socket.on('diceRolled', (data) => this.handleRemoteDice(data));
                this.socket.on('pieceMoved', (move) => this.handleRemoteMove(move));
                this.socket.on('gameOver', (winner) => this.showWinner(winner));
            }

            showJoinModal() {
                document.getElementById('joinModal').style.display = 'block';
            }

            joinGame() {
                const name = document.getElementById('playerName').value.trim();
                if (!name) return alert('Please enter your name');
                
                this.socket.emit('joinGame', name);
                document.getElementById('joinModal').style.display = 'none';
            }

            createGame() {
                const name = document.getElementById('playerName').value.trim() || 'Player';
                this.socket.emit('createGame', name);
                document.getElementById('joinModal').style.display = 'none';
            }

            updatePlayers(players) {
                const container = document.getElementById('playersInfo');
                container.innerHTML = '';
                
                players.forEach((player, index) => {
                    const div = document.createElement('div');
                    div.className = `player-info player-color-${index} ${player.id === this.playerId ? 'active' : ''}`;
                    div.innerHTML = `
                        <div style="font-size: 24px; font-weight: bold;">${player.name}</div>
                        <div>Pieces: ${player.piecesInHome}/${player.totalPieces}</div>
                    `;
                    container.appendChild(div);
                    
                    if (player.id === this.playerId) {
                        this.playerColor = index;
                    }
                });
            }

            setCurrentPlayer(playerId) {
                this.currentPlayer = playerId;
                const status = document.getElementById('status');
                const rollBtn = document.getElementById('rollBtn');
                
                if (playerId === this.playerId) {
                    status.textContent = 'Your turn! Roll the dice!';
                    rollBtn.disabled = false;
                } else {
                    status.textContent = 'Waiting for opponent...';
                    rollBtn.disabled = true;
                }
            }

            rollDice() {
                const dice = document.getElementById('dice');
                const rollBtn = document.getElementById('rollBtn');
                
                rollBtn.disabled = true;
                dice.classList.add('rolling');
                
                // Simulate roll
                const roll = Math.floor(Math.random() * 6) + 1;
                setTimeout(() => {
                    dice.textContent = roll;
                    dice.classList.remove('rolling');
                    this.diceValue = roll;
                    
                    this.socket.emit('rollDice', { gameId: this.gameId, diceValue: roll });
                    
                    if (roll === 6) {
                        document.getElementById('status').textContent = 'Got a 6! You can roll again or move!';
                    } else {
                        document.getElementById('status').textContent = `Dice: ${roll}. Click a piece to move!`;
                    }
                }, 800);
            }

            handleRemoteDice(data) {
                const dice = document.getElementById('dice');
                dice.textContent = data.diceValue;
                this.diceValue = data.diceValue;
            }

            canMovePiece(piece) {
                return this.currentPlayer === this.playerId && 
                       piece.classList.contains(`piece-${this.playerColor}`) &&
                       !piece.classList.contains('selected');
            }

            movePiece(piece) {
                const pieceId = piece.dataset.pieceId;
                const currentPos
